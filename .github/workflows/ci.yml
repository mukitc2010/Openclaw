name: openclaw-ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  api-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install API dependencies
        run: |
          cd apps/api
          pip install -r requirements.txt
      - name: Import validation
        run: |
          cd apps/api
          python -c "from app.main import app; print(app.title)"

  mcp-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install mcp dependencies
        run: |
          cd apps/mcp-server
          npm ci
      - name: Build mcp server
        run: |
          cd apps/mcp-server
          npm run build

  web-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install web dependencies
        run: |
          cd apps/web
          npm install
      - name: Build web
        run: |
          cd apps/web
          npm run build
