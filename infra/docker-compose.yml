version: "3.9"

services:
  api:
    image: python:3.12-slim
    working_dir: /workspace/apps/api
    volumes:
      - ../:/workspace
    command: sh -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8010:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 15s
    restart: unless-stopped
    networks:
      - openclaw-net

  web:
    image: node:22-alpine
    working_dir: /workspace/apps/web
    volumes:
      - ../:/workspace
    command: sh -c "npm install && npm run dev"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8010
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 25s
    restart: unless-stopped
    networks:
      - openclaw-net

  mcp-server:
    image: node:22-alpine
    working_dir: /workspace/apps/mcp-server
    volumes:
      - ../:/workspace
    command: sh -c "npm install && npm run dev"
    environment:
      - NODE_ENV=development
    stdin_open: true
    tty: true
    restart: unless-stopped
    profiles: ["mcp"]
    networks:
      - openclaw-net

networks:
  openclaw-net:
    driver: bridge
